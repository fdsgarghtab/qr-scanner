<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Сканер участников</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin: 0 0 8px 0;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a67d8;
            transform: scale(0.98);
        }
        .btn-stop {
            background: #e53e3e;
            color: white;
        }
        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
            text-align: center;
            background: #e2e8f0;
            color: #2d3748;
            transition: 0.2s;
        }
        .last-scan {
            margin-top: 12px;
            font-size: 12px;
            color: #718096;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📱 Сканер участников</h1>
    <div class="subtitle">Наведите на QR-код из Leader-ID</div>
    <div id="reader"></div>
    <button id="startBtn" class="btn-primary">▶ Запустить сканер</button>
    <button id="stopBtn" class="btn-stop" style="display: none;">⏹ Остановить</button>
    <div id="result" class="result">Готов к работе</div>
    <div id="lastScanInfo" class="last-scan"></div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzq-5XUiRTi0re38PiRV_eAwDGgQKfFaYUaoPs9zMxtEITgqUdkuwvSI43ucdBpCYs3Vw/exec'; // ЗАМЕНИТЕ
    
    let html5QrCode;
    let isScanning = false;
    let lastScannedId = null;
    let lastScanTime = 0;
    let isProcessing = false; // блокировка обработки на время паузы
    
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resultDiv = document.getElementById('result');
    const lastScanDiv = document.getElementById('lastScanInfo');
    
    let messageTimeout = null;
    
    function showMessage(text, isError = false) {
        if (messageTimeout) clearTimeout(messageTimeout);
        resultDiv.innerHTML = text;
        resultDiv.style.background = isError ? '#fed7d7' : '#e2e8f0';
        resultDiv.style.color = isError ? '#742a2a' : '#2d3748';
        // Автоматически сбросить сообщение через 2 секунды, если не было нового
        messageTimeout = setTimeout(() => {
            if (resultDiv.innerHTML === text) {
                resultDiv.innerHTML = 'Готов к работе';
                resultDiv.style.background = '#e2e8f0';
                resultDiv.style.color = '#2d3748';
            }
        }, 2000);
    }
    
    function extractUserId(scanText) {
        const match = scanText.match(/leader-id\.ru\/users\/(\d+)/);
        if (match) return match[1];
        return scanText;
    }
    
    function sendMark(id) {
        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        }).catch(e => console.warn('Ошибка отправки:', e));
    }
    
    function onScanSuccess(decodedText) {
        if (!isScanning || isProcessing) return; // если пауза – игнорируем
        
        const userId = extractUserId(decodedText);
        const now = Date.now();
        if (userId === lastScannedId && now - lastScanTime < 3000) {
            showMessage(`⚠️ Повторное сканирование ID ${userId} игнорируется`, true);
            return;
        }
        
        lastScannedId = userId;
        lastScanTime = now;
        
        // Включаем блокировку на 1 секунду
        isProcessing = true;
        showMessage(`✅ Отметка для ID ${userId} отправлена`, false);
        lastScanDiv.innerHTML = `Последний ID: ${userId} в ${new Date().toLocaleTimeString()}`;
        
        sendMark(userId);
        
        // Через 1 секунду снимаем блокировку
        setTimeout(() => {
            isProcessing = false;
        }, 1000);
    }
    
    function startScanner() {
        if (isScanning) return;
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                isScanning = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                showMessage('📷 Камера работает. Наведите на QR-код.', false);
            })
            .catch(err => {
                console.error(err);
                showMessage('❌ Не удалось запустить камеру. Проверьте разрешения.', true);
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            });
    }
    
    function stopScanner() {
        if (html5QrCode && isScanning) {
            html5QrCode.stop().then(() => {
                isScanning = false;
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                showMessage('⏸ Сканер остановлен', false);
            }).catch(err => console.log(err));
        }
    }
    
    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', stopScanner);
    
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showMessage('❌ Ваш браузер не поддерживает доступ к камере', true);
    }
</script>
</body>
</html>
