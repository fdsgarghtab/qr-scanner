<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Сканер участников</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin: 0 0 8px 0;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a67d8;
            transform: scale(0.98);
        }
        .btn-stop {
            background: #e53e3e;
            color: white;
        }
        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 500;
            text-align: center;
        }
        .success { background: #c6f6d5; color: #22543d; }
        .error { background: #fed7d7; color: #742a2a; }
        .info { background: #e2e8f0; color: #2d3748; }
        .warning { background: #feebc8; color: #7b341e; }
        .last-scan {
            margin-top: 12px;
            font-size: 12px;
            color: #718096;
            text-align: center;
        }
        .status-bar {
            background: #edf2f7;
            padding: 8px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            text-align: center;
            color: #4a5568;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📱 Сканер участников</h1>
    <div class="subtitle">Наведите на QR-код из Leader-ID</div>
    <div id="reader"></div>
    <button id="startBtn" class="btn-primary">▶ Запустить сканер</button>
    <button id="stopBtn" class="btn-stop" style="display: none;">⏹ Остановить</button>
    <div id="result" class="result info">Готов к работе</div>
    <div id="lastScanInfo" class="last-scan"></div>
    <div id="statusBar" class="status-bar">⚡ Ожидание сканирования</div>
</div>

<script>
    // ⚠️ ЗАМЕНИТЕ НА ВАШ URL ИЗ APPS SCRIPT
    const API_URL = 'https://script.google.com/macros/s/AKfycbzq-5XUiRTi0re38PiRV_eAwDGgQKfFaYUaoPs9zMxtEITgqUdkuwvSI43ucdBpCYs3Vw/exec';
    
    let participants = [];         // [{ id, name, events: [bool, ...] }]
    let todayEventNumber = null;   // номер сегодняшнего мероприятия (1..10)
    
    let html5QrCode;
    let isScanning = false;
    let lastScannedId = null;
    let lastScanTime = 0;
    
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resultDiv = document.getElementById('result');
    const lastScanDiv = document.getElementById('lastScanInfo');
    const statusBar = document.getElementById('statusBar');
    
    function showMessage(text, type) {
        resultDiv.innerHTML = text;
        resultDiv.className = 'result ' + type;
        statusBar.innerHTML = type === 'success' ? '✅ ' + text : '⚡ ' + text;
    }
    
    function extractUserId(scanText) {
        const match = scanText.match(/leader-id\.ru\/users\/(\d+)/);
        if (match) return match[1];
        return scanText;
    }
    
    // Загрузка данных с сервера (GET с CORS)
    async function loadParticipants() {
        showMessage('Загрузка списка участников...', 'info');
        try {
            const response = await fetch(API_URL, {
                method: 'GET',
                mode: 'cors'
            });
            const data = await response.json();
            if (data.error) {
                showMessage(`Ошибка загрузки: ${data.error}`, 'error');
                return false;
            }
            participants = data.participants || [];
            todayEventNumber = data.todayEventNumber;
            showMessage(`Загружено ${participants.length} участников. Сегодня мероприятие №${todayEventNumber || 'нет'}`, 'success');
            return true;
        } catch (err) {
            console.error(err);
            showMessage(`Ошибка загрузки данных: ${err.message}`, 'error');
            return false;
        }
    }
    
    // Отправка отметки на сервер (POST через no-cors, ответ не ждём)
    function sendMark(id) {
        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        }).catch(e => console.warn('Ошибка отправки (не влияет):', e));
    }
    
    // Локальная проверка и отметка
    function processUser(userId) {
        const participant = participants.find(p => p.id === userId);
        if (!participant) {
            showMessage(`❌ Участник с ID ${userId} не найден в списке`, 'error');
            return false;
        }
        
        if (!todayEventNumber) {
            showMessage(`⚠️ Сегодня нет мероприятий`, 'warning');
            return false;
        }
        
        const eventIndex = todayEventNumber - 1; // 0-индекс
        if (participant.events[eventIndex]) {
            showMessage(`⚠️ Участник ${participant.name} уже отмечен на сегодняшнее мероприятие`, 'warning');
            return false;
        }
        
        // Отмечаем локально
        participant.events[eventIndex] = true;
        // Отправляем запрос на сервер (не ждём ответа)
        sendMark(userId);
        showMessage(`✅ ${participant.name} отмечен на мероприятие ${todayEventNumber}`, 'success');
        return true;
    }
    
    function onScanSuccess(decodedText) {
        if (!isScanning) return;
        
        const userId = extractUserId(decodedText);
        
        const now = Date.now();
        if (userId === lastScannedId && now - lastScanTime < 3000) {
            showMessage(`⚠️ Повторное сканирование ID ${userId} игнорируется`, 'warning');
            return;
        }
        lastScannedId = userId;
        lastScanTime = now;
        
        processUser(userId);
        lastScanDiv.innerHTML = `Последний ID: ${userId} в ${new Date().toLocaleTimeString()}`;
    }
    
    function startScanner() {
        if (isScanning) return;
        
        if (!participants.length) {
            showMessage('Сначала загрузите список участников (нажмите "Загрузить список")', 'error');
            return;
        }
        
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                isScanning = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                showMessage('📷 Камера работает. Наведите на QR-код.', 'info');
            })
            .catch(err => {
                console.error(err);
                showMessage('❌ Не удалось запустить камеру. Проверьте разрешения.', 'error');
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            });
    }
    
    function stopScanner() {
        if (html5QrCode && isScanning) {
            html5QrCode.stop().then(() => {
                isScanning = false;
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                showMessage('⏸ Сканер остановлен', 'info');
            }).catch(err => console.log(err));
        }
    }
    
    // Добавим кнопку для ручной загрузки данных (на случай, если нужно обновить список)
    const loadBtn = document.createElement('button');
    loadBtn.textContent = '🔄 Загрузить список';
    loadBtn.className = 'btn-primary';
    loadBtn.style.marginTop = '5px';
    loadBtn.onclick = async () => {
        await loadParticipants();
        if (participants.length > 0 && !isScanning) {
            showMessage('Список загружен. Можете начинать сканирование.', 'success');
        }
    };
    document.querySelector('.container').appendChild(loadBtn);
    
    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', stopScanner);
    
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showMessage('❌ Ваш браузер не поддерживает доступ к камере', 'error');
    }
    
    // Автоматическая загрузка списка при старте
    loadParticipants();
</script>
</body>
</html>
