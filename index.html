<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Сканер участников</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <style>
        /* ... (стили оставьте те же, что были) ... */
    </style>
</head>
<body>
<div class="container">
    <h1>📱 Сканер участников</h1>
    <div class="subtitle">Наведите на QR-код из Leader-ID</div>
    <div id="reader"></div>
    <button id="startBtn" class="btn-primary">▶ Запустить сканер</button>
    <button id="stopBtn" class="btn-stop" style="display: none;">⏹ Остановить</button>
    <div id="result" class="result info">Готов к работе</div>
    <div id="lastScanInfo" class="last-scan"></div>
    <div id="statusBar" class="status-bar">⚡ Ожидание сканирования</div>
</div>

<script>
    // ⚠️ ЗАМЕНИТЕ НА ВАШ URL ИЗ APPS SCRIPT
    const API_URL = 'https://script.google.com/macros/s/AKfycbzq-5XUiRTi0re38PiRV_eAwDGgQKfFaYUaoPs9zMxtEITgqUdkuwvSI43ucdBpCYs3Vw/exec';
    
    let html5QrCode;
    let isScanning = false;
    let lastScannedId = null;
    let lastScanTime = 0;
    
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resultDiv = document.getElementById('result');
    const lastScanDiv = document.getElementById('lastScanInfo');
    const statusBar = document.getElementById('statusBar');
    
    function showMessage(text, type) {
        resultDiv.innerHTML = text;
        resultDiv.className = 'result ' + type;
        statusBar.innerHTML = type === 'success' ? '✅ ' + text : '⚡ ' + text;
    }
    
    function extractUserId(scanText) {
        const match = scanText.match(/leader-id\.ru\/users\/(\d+)/);
        if (match) return match[1];
        return scanText;
    }
    
    async function sendToServer(scannedId) {
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: scannedId })
            });
            return { success: true, message: 'Запрос отправлен' };
        } catch (error) {
            console.error('Ошибка отправки:', error);
            return { success: false, message: 'Ошибка связи: ' + error.message };
        }
    }
    
    function onScanSuccess(decodedText) {
        if (!isScanning) return;
        
        const userId = extractUserId(decodedText);
        
        // Защита от повторного сканирования того же ID в течение 3 секунд
        const now = Date.now();
        if (userId === lastScannedId && now - lastScanTime < 3000) {
            showMessage(`⚠️ Повторное сканирование ID ${userId} игнорируется`, 'warning');
            return;
        }
        lastScannedId = userId;
        lastScanTime = now;
        
        showMessage(`🔍 Обработка ID: ${userId}...`, 'info');
        
        sendToServer(userId).then(response => {
            if (response.success) {
                showMessage(`✅ Отметка для ID ${userId} отправлена`, 'success');
                lastScanDiv.innerHTML = `Последний ID: ${userId} в ${new Date().toLocaleTimeString()}`;
            } else {
                showMessage(`❌ ${response.message}`, 'error');
            }
        });
    }
    
    function startScanner() {
        if (isScanning) return;
        
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                isScanning = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                showMessage('📷 Камера работает. Наведите на QR-код.', 'info');
            })
            .catch(err => {
                console.error(err);
                showMessage('❌ Не удалось запустить камеру. Проверьте разрешения.', 'error');
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            });
    }
    
    function stopScanner() {
        if (html5QrCode && isScanning) {
            html5QrCode.stop().then(() => {
                isScanning = false;
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                showMessage('⏸ Сканер остановлен', 'info');
            }).catch(err => console.log(err));
        }
    }
    
    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', stopScanner);
    
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showMessage('❌ Ваш браузер не поддерживает доступ к камере', 'error');
    }
</script>
</body>
</html>
