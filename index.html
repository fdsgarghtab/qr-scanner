<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Сканер участников</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <style>
        /* Ваши стили (оставьте как есть) */
    </style>
</head>
<body>
<div class="container">
    <h1>📱 Сканер участников</h1>
    <div class="subtitle">Наведите на QR-код из Leader-ID</div>
    <div id="reader"></div>
    <button id="startBtn" class="btn-primary">▶ Запустить сканер</button>
    <button id="stopBtn" class="btn-stop" style="display: none;">⏹ Остановить</button>
    <div id="result" class="result info">Готов к работе</div>
    <div id="lastScanInfo" class="last-scan"></div>
    <div id="statusBar" class="status-bar">⚡ Ожидание сканирования</div>
</div>

<iframe id="hiddenFrame" style="display:none;"></iframe>

<script>
    // ⚠️ ЗАМЕНИТЕ НА АКТУАЛЬНЫЙ URL ВАШЕГО ВЕБ-ПРИЛОЖЕНИЯ
    const API_URL = 'https://script.google.com/macros/s/AKfycbzq-5XUiRTi0re38PiRV_eAwDGgQKfFaYUaoPs9zMxtEITgqUdkuwvSI43ucdBpCYs3Vw/exec';
    
    let html5QrCode;
    let isScanning = false;
    let lastScannedId = null;
    let lastScanTime = 0;
    let pendingRequestId = null;
    
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resultDiv = document.getElementById('result');
    const lastScanDiv = document.getElementById('lastScanInfo');
    const statusBar = document.getElementById('statusBar');
    const hiddenFrame = document.getElementById('hiddenFrame');
    
    function showMessage(text, type) {
        resultDiv.innerHTML = text;
        resultDiv.className = 'result ' + type;
        statusBar.innerHTML = type === 'success' ? '✅ ' + text : '⚡ ' + text;
    }
    
    function extractUserId(scanText) {
        const match = scanText.match(/leader-id\.ru\/users\/(\d+)/);
        if (match) return match[1];
        return scanText;
    }
    
    function sendToServer(scannedId) {
        return new Promise((resolve, reject) => {
            pendingRequestId = scannedId;
            // Создаём форму и отправляем через iframe
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = API_URL;
            form.target = 'hiddenFrame';
            form.style.display = 'none';
            
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'id';
            input.value = scannedId;
            form.appendChild(input);
            
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
            
            // Устанавливаем таймаут
            const timeout = setTimeout(() => {
                window.removeEventListener('message', handleMessage);
                reject(new Error('Таймаут ответа'));
            }, 5000);
            
            function handleMessage(event) {
                if (event.data && event.data.id === scannedId) {
                    clearTimeout(timeout);
                    window.removeEventListener('message', handleMessage);
                    resolve(event.data);
                }
            }
            
            window.addEventListener('message', handleMessage);
        });
    }
    
    // Слушаем загрузку iframe и извлекаем ответ
    hiddenFrame.onload = function() {
        try {
            const iframeDoc = hiddenFrame.contentDocument || hiddenFrame.contentWindow.document;
            const responseText = iframeDoc.body.innerText || iframeDoc.body.textContent;
            if (responseText && pendingRequestId) {
                let type = 'error';
                let message = responseText;
                if (responseText.startsWith('success')) type = 'success';
                else if (responseText.startsWith('warning')) type = 'warning';
                else if (responseText.startsWith('error')) type = 'error';
                else type = 'info';
                
                window.postMessage({ id: pendingRequestId, type: type, message: message }, '*');
                pendingRequestId = null;
            }
        } catch(e) {
            console.error('Ошибка чтения iframe', e);
        }
    };
    
    function onScanSuccess(decodedText) {
        if (!isScanning) return;
        
        const userId = extractUserId(decodedText);
        
        const now = Date.now();
        if (userId === lastScannedId && now - lastScanTime < 3000) {
            showMessage(`⚠️ Повторное сканирование ID ${userId} игнорируется`, 'warning');
            return;
        }
        lastScannedId = userId;
        lastScanTime = now;
        
        showMessage(`🔍 Обработка ID: ${userId}...`, 'info');
        
        sendToServer(userId).then(response => {
            if (response.type === 'success') {
                showMessage(`✅ ${response.message}`, 'success');
            } else if (response.type === 'warning') {
                showMessage(`⚠️ ${response.message}`, 'warning');
            } else {
                showMessage(`❌ ${response.message}`, 'error');
            }
            lastScanDiv.innerHTML = `Последний ID: ${userId} в ${new Date().toLocaleTimeString()}`;
        }).catch(err => {
            showMessage(`❌ Ошибка связи: ${err.message}`, 'error');
        });
    }
    
    function startScanner() {
        if (isScanning) return;
        
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                isScanning = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                showMessage('📷 Камера работает. Наведите на QR-код.', 'info');
            })
            .catch(err => {
                console.error(err);
                showMessage('❌ Не удалось запустить камеру. Проверьте разрешения.', 'error');
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            });
    }
    
    function stopScanner() {
        if (html5QrCode && isScanning) {
            html5QrCode.stop().then(() => {
                isScanning = false;
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                showMessage('⏸ Сканер остановлен', 'info');
            }).catch(err => console.log(err));
        }
    }
    
    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', stopScanner);
    
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showMessage('❌ Ваш браузер не поддерживает доступ к камере', 'error');
    }
</script>
</body>
</html>
